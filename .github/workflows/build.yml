name: Build firmware

# Builds the MARF firmware on every push and pull request.
# Pushing a tag like v2.67 additionally publishes a GitHub Release with the
# .hex and .bin attached.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to create a Release on tag pushes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Arm GNU toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.3.Rel1'

      - name: Build
        run: make -j"$(nproc)"

      - name: Report size
        run: arm-none-eabi-size build/MARF.elf

      - name: Name the artifacts
        id: name
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo "${GITHUB_SHA::8}")"
          fi
          DATE="$(date -u +%Y-%m-%d)"
          BASE="marf-${VERSION}-${DATE}"
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          cp build/MARF.hex "build/${BASE}.hex"
          cp build/MARF.bin "build/${BASE}.bin"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.base }}
          path: |
            build/${{ steps.name.outputs.base }}.hex
            build/${{ steps.name.outputs.base }}.bin
            build/MARF.elf
            build/MARF.map
          if-no-files-found: error

      - name: Publish release (on tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/${{ steps.name.outputs.base }}.hex
            build/${{ steps.name.outputs.base }}.bin
          generate_release_notes: true
