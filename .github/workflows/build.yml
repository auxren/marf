name: Build firmware

# Builds the MARF firmware on every push and pull request.
# Pushing a tag like v2.67 additionally publishes a GitHub Release with the
# .hex and .bin attached.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to create a Release on tag pushes

# GitHub is removing the Node 20 runtime from the runners; opt the pinned JS
# actions (checkout, upload-artifact, gh-release) into Node 24 now so they stop
# emitting the deprecation warning. Harmless once Node 24 is the default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run host unit tests (both hardware variants)
        run: make test HOST_CC=gcc

      - name: V1 compatibility lint
        run: ./tools/v1_compat_lint.sh

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Arm GNU toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.3.Rel1'

      - name: Build (v2, default)
        run: make -j"$(nproc)"

      - name: Build (REV1, v1 hardware)
        run: make -j"$(nproc)" rev1

      - name: Report size
        run: |
          arm-none-eabi-size build/MARF.elf
          arm-none-eabi-size build-rev1/MARF-REV1.elf

      - name: Build user manual (PDF)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc texlive-xetex texlive-latex-recommended \
            texlive-fonts-recommended lmodern
          make manual PANDOC_PDF_ENGINE=xelatex

      - name: Name the artifacts
        id: name
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo "${GITHUB_SHA::8}")"
          fi
          DATE="$(date -u +%Y-%m-%d)"
          BASE="marf-${VERSION}-${DATE}"
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          cp build/MARF.hex "build/${BASE}.hex"
          cp build/MARF.bin "build/${BASE}.bin"
          cp build/MARF-Manual.pdf "build/${BASE}-manual.pdf"
          cp build-rev1/MARF-REV1.hex "build/${BASE}-REV1.hex"
          cp build-rev1/MARF-REV1.bin "build/${BASE}-REV1.bin"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.base }}
          path: |
            build/${{ steps.name.outputs.base }}.hex
            build/${{ steps.name.outputs.base }}.bin
            build/${{ steps.name.outputs.base }}-manual.pdf
            build/${{ steps.name.outputs.base }}-REV1.hex
            build/${{ steps.name.outputs.base }}-REV1.bin
            build/MARF.elf
            build/MARF.map
          if-no-files-found: error

      - name: Publish release (on tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/${{ steps.name.outputs.base }}.hex
            build/${{ steps.name.outputs.base }}.bin
            build/${{ steps.name.outputs.base }}-manual.pdf
            build/${{ steps.name.outputs.base }}-REV1.hex
            build/${{ steps.name.outputs.base }}-REV1.bin
          generate_release_notes: true
